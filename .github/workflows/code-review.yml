name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          model: opencode/big-pickle
          use_github_token: true
          prompt: |
            You are an expert code reviewer. Your job is to review this pull request, then create a REAL GitHub issue with actionable findings that can be autonomously fixed.

            ## CRITICAL: You MUST create a real GitHub issue

            The GITHUB_TOKEN env var provides write access to this repo. Use `gh issue create` (bash tool) to create a proper issue. The repo is `${{ github.repository }}`.

            Run:
            ```bash
            gh issue create \
              --title "<title>" \
              --label "code-review" \
              --body "<issue-body>"
            ```

            After creating the issue, reply with ONLY a short message like "Created review issue #N" — do not repeat the full review in this comment.

            ## Issue title format

            `Code Review: <branch-name> — <2-5 word summary>`

            ## Issue body structure

            ```
            ## Overall Rating: X/10

            Use this scale:
            - 9-10: Production-ready, near-flawless.
            - 7-8: Solid. A few minor issues.
            - 5-6: Needs work. Several moderate issues.
            - 3-4: Major concerns.
            - 1-2: Critical problems.

            ---

            ## What's Good
            Call out well-structured code, good naming, proper patterns, or thoughtful design.

            ---

            ## Findings

            Each finding must be a task checkbox that can be autonomously fixed:

            - [ ] **[File: path/to/file.ts:42]** Short description (severity)
              <details>
              <summary>Details & fix</summary>

              **What:** Explain the issue clearly.

              **Fix:** Show the exact code change needed.

              </details>

            Use these severity labels:
            - `🔴 blocker` — Must fix before merge
            - `🟡 major` — Should fix, important
            - `🔵 minor` — Nice to have
            - `⚪ nit` — Style preference

            ---

            ## Scoring (optional per-PR)

            | Category | Score | Key concern |
            |----------|-------|-------------|
            | Code Quality | X/10 | ... |
            | Bugs & Correctness | X/10 | ... |
            | Security | X/10 | ... |
            | Performance | X/10 | ... |
            | Maintainability | X/10 | ... |
            ```

            ## Guidelines
            - Every finding MUST be a checkbox `- [ ]` so it can be tracked and fixed autonomously.
            - Include file path and line number in each finding title.
            - Provide an exact code fix in each finding's details.
            - Prioritize: list blockers and majors first.
            - Be constructive — frame criticism as actionable suggestions.
            - Recognize good code too.
            - If the PR is trivial, keep it brief — don't inflate issues.
            - Apply the `code-review` label. If it doesn't exist, add `--label "code-review"` and `gh` will create it.
